<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Companion</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="drag-bar" data-tauri-drag-region>
    <div class="title" data-tauri-drag-region>Game Companion Beta</div>
    <div class="drag-bar-actions">
      <button id="minBtn" class="window-btn min-btn" title="Minimize" aria-label="Minimize"></button>
      <button id="maxBtn" class="window-btn max-btn" title="Maximize" aria-label="Maximize"></button>
      <button id="closeBtn" class="window-btn close-btn" title="Close" aria-label="Close"></button>
    </div>
  </div>

  <div class="tool-strip">
    <select id="gameSelect" class="game-select" title="Game">
      <option value="">Game</option>
    </select>
    <button id="hudBtn" class="hud-btn active" title="Clear HUD overlay">HUD</button>
    <button id="hudTestBtn" class="hud-btn" title="Show a HUD test mark">Test</button>
    <button id="protectBtn" class="hud-btn active" title="Hide companion windows from screenshots">Protect</button>
    <button id="perfBtn" class="perf-btn" title="Performance mode">Perf</button>
  </div>

  <div id="chatWindow" class="chat-window">
    <div class="message bot-message">
      Ready. I can watch the screen, answer questions, and help during play.
      <br>
      <small style="opacity:0.72">F8 voice, F9 screenshot.</small>
    </div>
  </div>

  <div id="imagePreviewArea" class="image-preview-area" style="display: none;">
    <div class="preview-container">
      <img id="previewImg" src="" alt="Screenshot preview" />
      <button id="removeImgBtn" class="remove-img-btn" title="Remove image" aria-label="Remove image">x</button>
    </div>
  </div>

  <div class="input-area">
    <button id="voiceBtn" class="voice-btn" title="Voice input">Mic</button>
    <button id="screenshotBtn" class="screenshot-btn" title="Screenshot (F9)">Shot</button>
    <input type="text" id="messageInput" placeholder="Ask for help, or press F9 for screenshot analysis..." />
    <button id="stopBtn" class="stop-btn" style="display: none;">Stop</button>
    <button id="sendBtn">Send</button>
  </div>

  <button id="resizeGrip" class="resize-grip" title="Resize" aria-label="Resize"></button>

  <script type="module" src="/main.js"></script>
</body>

</html>
