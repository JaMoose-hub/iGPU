<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qwen Overlay Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- 頂部拖曳攔 -->
  <div class="drag-bar" data-tauri-drag-region>
    <div class="title" data-tauri-drag-region>遊戲陪伴Beta</div>
    <div class="drag-bar-actions">
      <button id="perfBtn" class="perf-btn" title="切換效能模式 (開啟/關閉模糊)">⚡</button>
      <button id="closeBtn" class="close-btn" title="關閉">✕</button>
    </div>
  </div>

  <!-- 聊天對話框 -->
  <div id="chatWindow" class="chat-window">
    <div class="message bot-message">
      您好！我是存在iGPU裡的大語言模型助理，有什麼我可以幫忙的嗎？<br>
      <small style="opacity:0.6">💡 按 F9 或點 📷 按鈕可截圖並詢問 AI</small>
    </div>
  </div>

  <!-- 影像預覽區域 (截圖後暫存在此) -->
  <div id="imagePreviewArea" class="image-preview-area" style="display: none;">
    <div class="preview-container">
      <img id="previewImg" src="" />
      <button id="removeImgBtn" class="remove-img-btn">✕</button>
    </div>
  </div>

  <!-- 輸入區域 -->
  <div class="input-area">
    <div class="opacity-control mini">
      <input type="range" id="opacitySlider" class="opacity-slider" min="0.1" max="1" step="0.05" value="0.85"
        title="調整視窗透明度" />
    </div>
    <button id="voiceBtn" class="voice-btn" title="語音輸入 (按住錄音)">🎙️</button>
    <button id="screenshotBtn" class="screenshot-btn" title="截圖全螢幕 (F9)">📷</button>
    <input type="text" id="messageInput" placeholder="輸入訊息，或按 F9 截圖..." />
    <button id="stopBtn" class="stop-btn" style="display: none;">停止</button>
    <button id="sendBtn">發送</button>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
